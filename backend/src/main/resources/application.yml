spring:
  application:
    name: MindLog Backend
  datasource:
    url: jdbc:postgresql://localhost:5432/mindlog
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

# Security (Temporary disable for dev if strictly needed, but we keep defaults for now)
# We will configure SecurityConfig later to allow H2 or specific endpoints if needed.
